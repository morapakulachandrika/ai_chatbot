<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password | AI Chat</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f7fb;
        }

        .card {
            width: 420px;
            background: white;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        .logo {
            text-align: center;
            color: #6c4cff;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #777;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
            margin-bottom: 20px;
        }

        input:focus {
            border-color: #6c4cff;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #6c4cff;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .back {
            text-align: center;
            margin-top: 22px;
        }

        .back a {
            color: #6c4cff;
            text-decoration: none;
            font-weight: bold;
        }
    </style>

</head>

<body>

<div class="card">

    <div class="logo">
        ✦ AI CHAT
    </div>

    <h1>Forgot Password?</h1>

    <p class="subtitle">
        Enter your registered email address and we'll send you
        instructions to reset your password.
    </p>

    <form method="POST">

        {% csrf_token %}

        <label>Email Address</label>

        {{ form.email }}

        <button type="submit">
            Send Reset Link
        </button>

    </form>

    <div class="back">

        <a href="{% url 'login' %}">
            ← Back to Login
        </a>

    </div>

</div>

</body>
</html>
