<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Check Your Email | AI Chat</title>

    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f7fb;
        }

        .card {
            width: 430px;
            background: white;
            padding: 45px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }

        .icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0edff;
            border-radius: 50%;
            font-size: 30px;
        }

        h1 {
            margin-bottom: 15px;
            color: #222;
        }

        p {
            color: #777;
            line-height: 1.7;
        }

        a {
            display: block;
            margin-top: 30px;
            padding: 14px;
            background: #6c4cff;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }

    </style>

</head>

<body>

<div class="card">

    <div class="icon">
        ✉
    </div>

    <h1>Check Your Email</h1>

    <p>
        If an account exists with the email address you entered,
        we've sent you a password reset link.
    </p>

    <p style="margin-top:10px;">
        Please check your inbox and spam folder.
    </p>

    <a href="{% url 'login' %}">
        Back to Login
    </a>

</div>

</body>
</html>
