<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | AI Chat</title>

    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f7fb;
        }

        .auth-card {
            width: 420px;
            background: white;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        .logo {
            text-align: center;
            color: #6c4cff;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 13px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
        }

        input:focus {
            border-color: #6c4cff;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #6c4cff;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #5839e8;
        }

        .register-text {
            margin-top: 22px;
            text-align: center;
            color: #666;
        }

        .register-text a {
            color: #6c4cff;
            text-decoration: none;
            font-weight: bold;
        }

        .message {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            background: #ffeaea;
            color: #c62828;
            text-align: center;
        }
        .forgot-password {
            text-align: right;
            margin-top: -5px;
            margin-bottom: 18px;
        }

        .forgot-password a {
            color: #6c4cff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

    </style>

</head>


<body>


<div class="auth-card">


    <div class="logo">

        ✦ AI CHAT

    </div>


    <h1>

        Welcome Back

    </h1>


    <p class="subtitle">

        Login to continue your conversation

    </p>


    {% if messages %}

        {% for message in messages %}

            <div class="message">

                {{ message }}

            </div>

        {% endfor %}

    {% endif %}


    <form method="POST">

        {% csrf_token %}


        <div class="input-group">

            <label>

                Username

            </label>


            <input
                type="text"
                name="username"
                placeholder="Enter your username"
                required
            >

        </div>


        <div class="input-group">

            <label>

                Password

            </label>


            <input
                type="password"
                name="password"
                placeholder="Enter your password"
                required
            >

        </div>
        <div class="forgot-password">
            <a href="{% url 'password_reset' %}">
            Forgot Password?
            </a>
        </div>

        <button type="submit">

            Sign In

        </button>


    </form>


    <div class="register-text">

        Don't have an account?

        <a href="{% url 'register' %}">

            Create Account

        </a>

    </div>


</div>


</body>

</html>
