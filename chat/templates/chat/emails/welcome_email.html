<!DOCTYPE html>
<html>
<body style="margin:0;background:#f5f7fb;font-family:Arial,sans-serif;padding:30px;">

<div style="max-width:600px;margin:auto;background:white;border-radius:16px;overflow:hidden;">

    <div style="background:#6c4cff;padding:30px;text-align:center;color:white;">
        <h1>✦ AI CHAT</h1>
    </div>

    <div style="padding:40px;">
        <h2>Welcome, {{ username }}! 👋</h2>

        <p style="color:#666;line-height:1.7;">
            Your AI Chat account has been created successfully.
            You can now log in and start chatting with your AI assistant.
        </p>

        <div style="background:#f5f3ff;padding:15px;border-radius:10px;margin:25px 0;">
            <strong>Username:</strong> {{ username }}
        </div>

        <p style="color:#777;">
            Thank you for joining us.
        </p>

        <p>
            <strong>AI Chat Team</strong>
        </p>
    </div>

</div>

</body>
</html>
