<!DOCTYPE html>
<html>
<body style="margin:0;background:#f5f7fb;font-family:Arial,sans-serif;padding:30px;">

<div style="max-width:600px;margin:auto;background:white;border-radius:16px;overflow:hidden;">

    <div style="background:#6c4cff;padding:30px;text-align:center;color:white;">
        <h1>✦ AI CHAT</h1>
    </div>

    <div style="padding:40px;">

        <h2>Reset Your Password</h2>

        <p style="color:#666;line-height:1.7;">
            Hello {{ user.get_username }},
        </p>

        <p style="color:#666;line-height:1.7;">
            We received a request to reset your AI Chat password.
            Click the button below to create a new password.
        </p>

        <div style="text-align:center;margin:35px 0;">

            <a
                href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
                style="
                    background:#6c4cff;
                    color:white;
                    padding:14px 28px;
                    border-radius:10px;
                    text-decoration:none;
                    font-weight:bold;
                    display:inline-block;
                "
            >
                Reset Password
            </a>

        </div>

        <p style="color:#888;font-size:14px;">
            If you didn't request a password reset,
            you can safely ignore this email.
        </p>

        <p style="margin-top:30px;">
            Thank you,<br>
            <strong>AI Chat Team</strong>
        </p>

    </div>

</div>

</body>
</html>
