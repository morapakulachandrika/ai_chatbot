<!DOCTYPE html>
<html>
<body style="margin:0;background:#f5f7fb;font-family:Arial,sans-serif;padding:30px;">

<div style="max-width:600px;margin:auto;background:white;border-radius:16px;overflow:hidden;">

    <div style="background:#6c4cff;padding:30px;text-align:center;color:white;">
        <h1>✦ AI CHAT ADMIN</h1>
    </div>

    <div style="padding:40px;">

        <h2>New User Registration</h2>

        <p style="color:#666;">
            A new user has successfully registered on AI Chat.
        </p>

        <div style="background:#f5f3ff;padding:20px;border-radius:10px;margin:25px 0;">

            <p>
                <strong>Username:</strong>
                {{ username }}
            </p>

            <p>
                <strong>Email:</strong>
                {{ email }}
            </p>

        </div>

        <p style="color:#777;">
            You can manage this user from the AI Chat Admin Panel.
        </p>

        <p>
            <strong>AI Chat System</strong>
        </p>

    </div>

</div>

</body>
</html>
